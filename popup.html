<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 劃詞助手設定</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>AI 劃詞助手</h1>

    <div class="form-group">
      <label for="baseUrl">API Base URL</label>
      <input type="text" id="baseUrl" placeholder="https://api.example.com/v1">
    </div>

    <div class="form-group">
      <label for="apiKey">API Key</label>
      <input type="password" id="apiKey" placeholder="輸入你的 API Key">
    </div>

    <div class="form-group">
      <label for="model">模型名稱</label>
      <div class="model-row">
        <input type="text" id="model" list="modelList" placeholder="輸入或選擇模型名稱" autocomplete="off">
        <datalist id="modelList"></datalist>
        <button id="fetchModelsBtn" class="btn-fetch" type="button">獲取</button>
      </div>
      <small id="modelHint">輸入 Base URL 和 API Key 後點擊獲取</small>
    </div>

    <div class="form-group">
      <label>快速預設問題</label>
      <div id="promptsList" class="prompts-list"></div>
      <div class="prompt-input-row">
        <input type="text" id="newPrompt" placeholder="輸入快速問題..." />
        <button id="addPromptBtn" class="btn-add" type="button">+</button>
      </div>
      <small>點擊對話框中的快速問題即可快速填入</small>
    </div>

    <div class="form-group toggle-group">
      <label class="toggle-label">
        <input type="checkbox" id="defaultPin" checked>
        <span>預設釘住對話框</span>
      </label>
      <small>開啟後新對話框自動釘住，不會因點擊外部而關閉</small>
    </div>

    <button id="saveBtn" class="btn-primary">儲存設定</button>

    <div id="status" class="status"></div>

    <div class="footer">
      <p>在任意頁面劃選文字即可使用</p>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
