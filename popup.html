<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 劃詞助手設定</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>AI 劃詞助手</h1>

    <div class="form-group">
      <label for="baseUrl">API Base URL</label>
      <input type="text" id="baseUrl" placeholder="https://api.example.com/v1">
      <small id="baseUrlHint"></small>
    </div>

    <div class="form-group">
      <label for="apiKey">API Key</label>
      <div class="input-with-toggle">
        <input type="password" id="apiKey" placeholder="輸入你的 API Key">
        <button id="toggleApiKey" class="toggle-visibility" type="button" aria-label="顯示或隱藏 API Key">
          <svg class="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg class="eye-closed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/></svg>
        </button>
      </div>
    </div>

    <div class="form-group">
      <label for="model">模型名稱</label>
      <div class="model-row">
        <input type="text" id="model" list="modelList" placeholder="輸入或選擇模型名稱" autocomplete="off">
        <datalist id="modelList"></datalist>
        <button id="fetchModelsBtn" class="btn-fetch" type="button">獲取</button>
      </div>
      <small id="modelHint">輸入 Base URL 和 API Key 後點擊獲取</small>
    </div>

    <div class="form-group">
      <label>快速預設問題</label>
      <div id="promptsList" class="prompts-list"></div>
      <div class="prompt-input-row">
        <input type="text" id="newPrompt" placeholder="輸入快速問題..." />
        <button id="addPromptBtn" class="btn-add" type="button">+</button>
      </div>
      <small>點擊對話框中的快速問題即可快速填入</small>
    </div>

    <div class="form-group toggle-group">
      <label class="toggle-label">
        <input type="checkbox" id="defaultPin" checked>
        <span>預設釘住對話框</span>
      </label>
      <small>開啟後新對話框自動釘住，不會因點擊外部而關閉</small>
    </div>

    <div id="status" class="status"></div>

    <div class="footer">
      <p>在任意頁面劃選文字即可使用</p>
      <p class="version"></p>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
